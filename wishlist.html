<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SNOOQ · my wishlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wishlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 2rem;
        }
        
        .wishlist-count {
            background: #b65f3a;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .wishlist-item {
            background: white;
            border: 1px solid #e2d6ca;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .wishlist-item:hover {
            transform: translateY(-3px);
            border-color: #b65f3a;
        }

        .wishlist-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #dc3545;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .wishlist-remove:hover {
            background: #dc3545;
            color: white;
        }

        .wishlist-image {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #f0e8de;
        }

        .wishlist-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .wishlist-info {
            padding: 1rem;
            text-align: center;
        }

        .wishlist-info h3 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .wishlist-price {
            color: #b65f3a;
            font-weight: 600;
            margin: 0.5rem 0;
        }

        .wishlist-action {
            width: 100%;
            padding: 0.6rem;
            background: transparent;
            border: 1px solid #4a3f38;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .wishlist-action:hover {
            background: #b65f3a;
            color: white;
            border-color: #b65f3a;
        }

        .empty-wishlist {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2d6ca;
        }

        .empty-wishlist i {
            font-size: 4rem;
            color: #b65f3a;
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        .empty-wishlist h3 {
            margin-bottom: 0.5rem;
        }

        .empty-wishlist p {
            color: #7d5f4b;
            margin-bottom: 2rem;
        }

        @media screen and (min-width: 600px) {
            .wishlist-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media screen and (min-width: 1024px) {
            .wishlist-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MOBILE HEADER -->
        <div class="mobile-header">
            <div class="logo" onclick="window.location='index.html'">SNOOQ<span>india</span></div>
            <div class="right-actions">
                <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i><span class="cart-count" style="display:none;">0</span></button>
                <button class="icon-btn" id="bagToggle"><i class="fas fa-shopping-bag"></i></button>
                <button class="icon-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>

        <!-- MOBILE MENU -->
        <div class="menu-overlay" id="mobileMenu">
            <div class="menu-grid">
                <div class="menu-cat">
                    <p>shop</p>
                    <ul>
                        <li><a href="shop.html?filter=new">new arrivals</a></li>
                        <li><a href="shop.html?filter=bestseller">bestsellers</a></li>
                        <li><a href="shop.html?filter=offer">offers</a></li>
                        <li><a href="shop.html?cat=hoodies">hoodies</a></li>
                        <li><a href="shop.html?cat=full sleeve">full sleeve</a></li>
                        <li><a href="shop.html?cat=half sleeve">half sleeve</a></li>
                    </ul>
                </div>
                <div class="menu-cat">
                    <p>discover</p>
                    <ul>
                        <li><a href="lookbook.html">lookbook</a></li>
                        <li><a href="#">studio</a></li>
                        <li><a href="#">sustainability</a></li>
                    </ul>
                </div>
            </div>
            <div class="menu-account">
                <div class="account-row">
                    <a href="profile.html"><i class="far fa-user"></i> profile</a>
                    <a href="wishlist.html"><i class="far fa-heart"></i> wishlist</a>
                    <a href="orders.html"><i class="fas fa-box"></i> orders</a>
                </div>
            </div>
        </div>

        <!-- WISHLIST HEADER -->
        <div class="wishlist-header">
            <h1 class="page-title">my wishlist</h1>
            <span class="wishlist-count" id="wishlistCount">0 items</span>
        </div>

        <!-- WISHLIST GRID -->
        <div class="wishlist-grid" id="wishlistGrid">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- BOTTOM POPUP -->
    <div class="bottom-popup">
        <div class="bottom-icon" onclick="window.location='index.html'">
            <i class="fas fa-home"></i>
            <span>home</span>
        </div>
        <div class="bottom-icon active" onclick="window.location='wishlist.html'">
            <i class="fas fa-heart"></i>
            <span>favourite</span>
        </div>
        <div class="bottom-icon" onclick="window.location='orders.html'">
            <i class="fas fa-box"></i>
            <span>orders</span>
        </div>
        <div class="bottom-icon" onclick="window.location='profile.html'">
            <i class="far fa-user"></i>
            <span>profile</span>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadWishlist();
        });

        function loadWishlist() {
            const wishlistProducts = db.getWishlistProducts();
            const grid = document.getElementById('wishlistGrid');
            const countSpan = document.getElementById('wishlistCount');

            countSpan.textContent = wishlistProducts.length + ' item' + (wishlistProducts.length !== 1 ? 's' : '');

            if (wishlistProducts.length === 0) {
                grid.innerHTML = `
                    <div class="empty-wishlist" style="grid-column: 1/-1;">
                        <i class="far fa-heart"></i>
                        <h3>your wishlist is empty</h3>
                        <p>Save your favorite items here</p>
                        <button class="btn" onclick="window.location='shop.html'">explore collection</button>
                    </div>
                `;
                return;
            }

            let html = '';
            wishlistProducts.forEach(product => {
                html += `
                    <div class="wishlist-item" data-product-id="${product.id}">
                        <div class="wishlist-remove" onclick="removeFromWishlist(${product.id}, event)">
                            <i class="fas fa-times"></i>
                        </div>
                        <div class="wishlist-image" onclick="viewProduct(${product.id})">
                            <img src="assets/images/${product.images[0]}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x300?text=${product.name}'">
                        </div>
                        <div class="wishlist-info">
                            <h3>${product.name}</h3>
                            <div class="wishlist-price">₹${product.price}</div>
                            <button class="wishlist-action" onclick="addToCartFromWishlist(${product.id}, event)">add to cart</button>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        function removeFromWishlist(productId, event) {
            event.stopPropagation();
            db.removeFromWishlist(productId);
            loadWishlist();
            updateCartCount();
            showNotification('Removed from wishlist');
        }

        function addToCartFromWishlist(productId, event) {
            event.stopPropagation();
            const result = db.addToCart(productId, 1);
            if (result.success) {
                updateCartCount();
                showNotification('Added to cart!');
            }
        }

        function viewProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #b65f3a;
                color: white;
                padding: 1rem 2rem;
                border-radius: 50px;
                z-index: 9999;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
    </script>
</body>
</html>
