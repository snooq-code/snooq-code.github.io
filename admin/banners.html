<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Banners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        /* Image Upload Styles */
        .image-upload-section {
            border: 2px dashed #b65f3a;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin: 1rem 0;
            background: #fdf6f0;
            cursor: pointer;
            transition: 0.3s;
        }

        .image-upload-section:hover {
            background: #f0e8de;
            border-color: #2c241e;
        }

        .image-upload-section i {
            font-size: 3rem;
            color: #b65f3a;
            margin-bottom: 1rem;
        }

        .image-upload-section p {
            color: #7d5f4b;
            margin-bottom: 0.5rem;
        }

        .image-upload-section small {
            color: #999;
            font-size: 0.85rem;
        }

        .image-preview {
            width: 100%;
            max-width: 300px;
            margin: 1rem auto;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2d6ca;
            position: relative;
            display: none;
        }

        .image-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-preview.active {
            display: block;
        }

        .image-preview .remove-image {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }

        .image-preview .remove-image:hover {
            background: #dc3545;
        }

        .upload-options {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .upload-option-btn {
            flex: 1;
            padding: 1rem;
            background: white;
            border: 1px solid #b65f3a;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            min-width: 150px;
        }

        .upload-option-btn:hover {
            background: #b65f3a;
            color: white;
        }

        .upload-option-btn i {
            font-size: 1.2rem;
        }

        .hidden-input {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0e8de;
            border-radius: 2px;
            margin: 1rem 0;
            display: none;
        }

        .progress-bar .fill {
            height: 100%;
            background: #28a745;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }

        /* Gallery Modal */
        .gallery-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .gallery-modal.active {
            display: flex;
        }

        .gallery-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .gallery-header h3 {
            color: #b65f3a;
        }

        .close-gallery {
            font-size: 1.5rem;
            cursor: pointer;
            color: #7d5f4b;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .gallery-item {
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            border-color: #b65f3a;
        }

        .gallery-item.selected {
            border-color: #28a745;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        /* Banner preview in table */
        .banner-preview {
            width: 100px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            background: #f0e8de;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html" class="active"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Banner Management</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Add Banner Form -->
            <div class="form-container" style="margin-bottom: 2rem;">
                <h2 style="margin-bottom: 1rem;">Add New Banner</h2>
                <form id="bannerForm" onsubmit="event.preventDefault(); addBanner();">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" class="form-control" id="bannerTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Subtitle</label>
                            <input type="text" class="form-control" id="bannerSubtitle">
                        </div>
                    </div>

                    <!-- Image Upload Section -->
                    <div class="form-group">
                        <label>Banner Image *</label>
                        
                        <!-- Upload Options -->
                        <div class="upload-options">
                            <div class="upload-option-btn" onclick="document.getElementById('fileInput').click()">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Upload Image</span>
                            </div>
                            <div class="upload-option-btn" onclick="openGallery()">
                                <i class="fas fa-images"></i>
                                <span>Choose from Gallery</span>
                            </div>
                            <div class="upload-option-btn" onclick="usePlaceholder()">
                                <i class="fas fa-palette"></i>
                                <span>Use Placeholder</span>
                            </div>
                        </div>

                        <!-- Hidden File Input -->
                        <input type="file" id="fileInput" class="hidden-input" accept="image/*" onchange="handleImageUpload(event)">

                        <!-- Upload Progress -->
                        <div class="progress-bar" id="uploadProgress">
                            <div class="fill" id="progressFill"></div>
                        </div>

                        <!-- Image Preview -->
                        <div class="image-preview" id="imagePreview">
                            <img src="" alt="Banner preview" id="previewImage">
                            <div class="remove-image" onclick="clearImage()">
                                <i class="fas fa-times"></i>
                            </div>
                        </div>

                        <!-- Hidden input for image data -->
                        <input type="hidden" id="bannerImage" value="">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Link URL</label>
                            <input type="text" class="form-control" id="bannerLink" placeholder="/shop">
                        </div>
                        <div class="form-group">
                            <label>Position</label>
                            <input type="number" class="form-control" id="bannerPosition" value="1" min="1">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Tags (comma separated)</label>
                            <input type="text" class="form-control" id="bannerTags" placeholder="organic, handmade, limited">
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem;">
                                <input type="checkbox" id="bannerActive" checked> Active
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Add Banner</button>
                </form>
            </div>

            <!-- Banners Table -->
            <div class="table-container">
                <h2 style="margin-bottom: 1rem;">Current Banners</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Preview</th>
                            <th>Title</th>
                            <th>Subtitle</th>
                            <th>Position</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bannersTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Gallery Modal -->
    <div class="gallery-modal" id="galleryModal">
        <div class="gallery-content">
            <div class="gallery-header">
                <h3>Select Banner Image</h3>
                <span class="close-gallery" onclick="closeGallery()">&times;</span>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery images will be loaded here -->
            </div>
            <div class="gallery-actions">
                <button class="btn" onclick="closeGallery()">Cancel</button>
                <button class="btn-primary" onclick="selectGalleryImage()">Select Image</button>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        // Store current banner image
        let currentBannerImage = '';

        document.addEventListener('DOMContentLoaded', function() {
            loadBannersTable();
        });

        // Handle image upload from file
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file type
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            // Validate file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('File size must be less than 5MB');
                return;
            }

            // Show progress bar
            document.getElementById('uploadProgress').style.display = 'block';
            document.getElementById('progressFill').style.width = '50%';

            // Read file as data URL
            const reader = new FileReader();
            reader.onload = function(e) {
                // Complete progress
                document.getElementById('progressFill').style.width = '100%';
                
                // Set image data
                currentBannerImage = e.target.result;
                
                // Show preview
                const preview = document.getElementById('imagePreview');
                const previewImg = document.getElementById('previewImage');
                previewImg.src = currentBannerImage;
                preview.classList.add('active');
                
                // Update hidden input
                document.getElementById('bannerImage').value = currentBannerImage;
                
                // Hide progress after 1 second
                setTimeout(() => {
                    document.getElementById('uploadProgress').style.display = 'none';
                    document.getElementById('progressFill').style.width = '0%';
                }, 1000);
            };
            reader.readAsDataURL(file);
        }

        // Open gallery modal
        function openGallery() {
            const modal = document.getElementById('galleryModal');
            const galleryGrid = document.getElementById('galleryGrid');
            
            // Load gallery images (product images + default banners)
            const products = db.getAllProducts();
            const banners = db.getAllBanners();
            let galleryHtml = '';

            // Add default banner placeholders
            const defaultImages = [
                'https://via.placeholder.com/800x400/b65f3a/ffffff?text=New+Collection',
                'https://via.placeholder.com/800x400/2b6c5e/ffffff?text=Summer+Sale',
                'https://via.placeholder.com/800x400/4a3f38/ffffff?text=Handcrafted',
                'https://via.placeholder.com/800x400/c73b2b/ffffff?text=Limited+Edition'
            ];

            defaultImages.forEach((img, index) => {
                galleryHtml += `
                    <div class="gallery-item" onclick="selectGalleryItem(this)" data-image="${img}">
                        <img src="${img}" alt="Default banner ${index + 1}">
                    </div>
                `;
            });

            // Add existing banner images
            banners.forEach(banner => {
                if (banner.image) {
                    galleryHtml += `
                        <div class="gallery-item" onclick="selectGalleryItem(this)" data-image="${banner.image}">
                            <img src="${banner.image}" alt="${banner.title}">
                        </div>
                    `;
                }
            });

            // Add product images
            products.forEach(product => {
                if (product.images && product.images.length > 0) {
                    galleryHtml += `
                        <div class="gallery-item" onclick="selectGalleryItem(this)" data-image="${product.images[0]}">
                            <img src="${product.images[0]}" alt="${product.name}">
                        </div>
                    `;
                }
            });

            galleryGrid.innerHTML = galleryHtml;
            modal.classList.add('active');
        }

        // Close gallery modal
        function closeGallery() {
            document.getElementById('galleryModal').classList.remove('active');
        }

        // Select gallery item
        function selectGalleryItem(element) {
            // Remove selected class from all items
            document.querySelectorAll('.gallery-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            // Add selected class to clicked item
            element.classList.add('selected');
        }

        // Select image from gallery
        function selectGalleryImage() {
            const selected = document.querySelector('.gallery-item.selected');
            
            if (selected) {
                const imageUrl = selected.dataset.image;
                currentBannerImage = imageUrl;
                
                // Show preview
                const preview = document.getElementById('imagePreview');
                const previewImg = document.getElementById('previewImage');
                previewImg.src = imageUrl;
                preview.classList.add('active');
                
                // Update hidden input
                document.getElementById('bannerImage').value = imageUrl;
                
                closeGallery();
            } else {
                alert('Please select an image');
            }
        }

        // Use placeholder image
        function usePlaceholder() {
            const title = document.getElementById('bannerTitle').value || 'Banner';
            const placeholderUrl = `https://via.placeholder.com/1200x400/b65f3a/ffffff?text=${encodeURIComponent(title)}`;
            
            currentBannerImage = placeholderUrl;
            
            // Show preview
            const preview = document.getElementById('imagePreview');
            const previewImg = document.getElementById('previewImage');
            previewImg.src = placeholderUrl;
            preview.classList.add('active');
            
            // Update hidden input
            document.getElementById('bannerImage').value = placeholderUrl;
        }

        // Clear image
        function clearImage() {
            currentBannerImage = '';
            document.getElementById('imagePreview').classList.remove('active');
            document.getElementById('bannerImage').value = '';
            document.getElementById('fileInput').value = '';
        }

        function loadBannersTable() {
            const banners = db.getAllBanners();
            const tbody = document.getElementById('bannersTableBody');

            if (banners.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No banners found</td></tr>';
                return;
            }

            let html = '';
            banners.sort((a, b) => a.position - b.position).forEach(banner => {
                // Determine image source
                let imageSrc = banner.image;
                if (!imageSrc.startsWith('data:') && !imageSrc.startsWith('http')) {
                    imageSrc = `../assets/images/${banner.image}`;
                }

                html += `
                    <tr>
                        <td>#${banner.id}</td>
                        <td>
                            <img src="${imageSrc}" alt="${banner.title}" 
                                 class="banner-preview"
                                 onerror="this.src='https://via.placeholder.com/100x50/b65f3a/ffffff?text=Banner'">
                        </td>
                        <td>${banner.title}</td>
                        <td>${banner.subtitle || '-'}</td>
                        <td>${banner.position}</td>
                        <td>
                            <span class="status-badge ${banner.active ? 'status-completed' : 'status-pending'}">
                                ${banner.active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td>
                            <button onclick="toggleBannerStatus(${banner.id})" class="btn-edit">
                                ${banner.active ? 'Deactivate' : 'Activate'}
                            </button>
                            <button onclick="deleteBanner(${banner.id})" class="btn-delete">Delete</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function addBanner() {
            const title = document.getElementById('bannerTitle').value;
            const subtitle = document.getElementById('bannerSubtitle').value;
            const image = document.getElementById('bannerImage').value;
            const link = document.getElementById('bannerLink').value;
            const position = parseInt(document.getElementById('bannerPosition').value);
            const tags = document.getElementById('bannerTags').value.split(',').map(t => t.trim()).filter(t => t);
            const active = document.getElementById('bannerActive').checked;

            if (!title) {
                alert('Please enter banner title');
                return;
            }

            if (!image) {
                alert('Please upload or select a banner image');
                return;
            }

            const banner = {
                title,
                subtitle,
                image,
                link,
                position,
                tags: tags.length ? tags : ['handcrafted', 'organic'],
                active
            };

            db.addBanner(banner);
            
            // Clear form
            document.getElementById('bannerTitle').value = '';
            document.getElementById('bannerSubtitle').value = '';
            document.getElementById('bannerLink').value = '';
            document.getElementById('bannerTags').value = '';
            document.getElementById('bannerPosition').value = '1';
            document.getElementById('bannerActive').checked = true;
            clearImage();
            
            loadBannersTable();
            showNotification('Banner added successfully');
        }

        function toggleBannerStatus(id) {
            const banners = db.getAllBanners();
            const banner = banners.find(b => b.id === id);
            
            if (banner) {
                banner.active = !banner.active;
                db.updateBanner(id, banner);
                loadBannersTable();
                showNotification(`Banner ${banner.active ? 'activated' : 'deactivated'}`);
            }
        }

        function deleteBanner(id) {
            if (confirm('Are you sure you want to delete this banner?')) {
                db.deleteBanner(id);
                loadBannersTable();
                showNotification('Banner deleted successfully');
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 1rem 2rem;
                border-radius: 5px;
                z-index: 9999;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }

        // Prevent default drag behaviors
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });

        document.addEventListener('drop', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
