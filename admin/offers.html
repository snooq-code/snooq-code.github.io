<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Offers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html" class="active"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Offer Management</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Add Offer Form -->
            <div class="form-container" style="margin-bottom: 2rem;">
                <h2 style="margin-bottom: 1rem;">Add New Offer</h2>
                <form id="offerForm" onsubmit="event.preventDefault(); addOffer();">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Offer Title *</label>
                            <input type="text" class="form-control" id="offerTitle" required placeholder="Summer Sale">
                        </div>
                        <div class="form-group">
                            <label>Coupon Code *</label>
                            <input type="text" class="form-control" id="offerCode" required placeholder="SUMMER30">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Discount Type</label>
                            <select class="form-control" id="offerType">
                                <option value="percentage">Percentage (%)</option>
                                <option value="fixed">Fixed Amount (₹)</option>
                                <option value="freeshipping">Free Shipping</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Discount Value</label>
                            <input type="number" class="form-control" id="offerValue" min="0" value="30">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Minimum Purchase (₹)</label>
                            <input type="number" class="form-control" id="offerMinPurchase" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>Valid Until</label>
                            <input type="date" class="form-control" id="offerValidUntil">
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="offerActive" checked> Active
                        </label>
                    </div>

                    <button type="submit" class="btn-primary">Add Offer</button>
                </form>
            </div>

            <!-- Offers Table -->
            <div class="table-container">
                <h2 style="margin-bottom: 1rem;">Current Offers</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Code</th>
                            <th>Discount</th>
                            <th>Min Purchase</th>
                            <th>Valid Until</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="offersTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadOffersTable();
            
            // Set default date to end of year
            const today = new Date();
            const endOfYear = new Date(today.getFullYear(), 11, 31);
            document.getElementById('offerValidUntil').value = endOfYear.toISOString().split('T')[0];
        });

        function loadOffersTable() {
            const offers = db.getAllOffers();
            const tbody = document.getElementById('offersTableBody');

            if (offers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No offers found</td></tr>';
                return;
            }

            let html = '';
            offers.forEach(offer => {
                const today = new Date().toISOString().split('T')[0];
                const isExpired = offer.validUntil < today;
                
                let discountText = '';
                if (offer.type === 'percentage') {
                    discountText = `${offer.discount}% off`;
                } else if (offer.type === 'fixed') {
                    discountText = `₹${offer.discount} off`;
                } else {
                    discountText = 'Free Shipping';
                }

                html += `
                    <tr>
                        <td>#${offer.id}</td>
                        <td>${offer.title}</td>
                        <td><strong>${offer.code}</strong></td>
                        <td>${discountText}</td>
                        <td>₹${offer.minPurchase}</td>
                        <td>${offer.validUntil} ${isExpired ? '(Expired)' : ''}</td>
                        <td>
                            <span class="status-badge ${offer.active && !isExpired ? 'status-completed' : 'status-pending'}">
                                ${offer.active && !isExpired ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td>
                            <button onclick="toggleOfferStatus(${offer.id})" class="btn-edit">
                                ${offer.active ? 'Deactivate' : 'Activate'}
                            </button>
                            <button onclick="deleteOffer(${offer.id})" class="btn-delete">Delete</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function addOffer() {
            const title = document.getElementById('offerTitle').value;
            const code = document.getElementById('offerCode').value.toUpperCase();
            const type = document.getElementById('offerType').value;
            const discount = parseInt(document.getElementById('offerValue').value);
            const minPurchase = parseInt(document.getElementById('offerMinPurchase').value);
            const validUntil = document.getElementById('offerValidUntil').value;
            const active = document.getElementById('offerActive').checked;

            if (!title || !code || !validUntil) {
                alert('Please fill required fields');
                return;
            }

            const offer = {
                title,
                code,
                type,
                discount,
                minPurchase,
                validUntil,
                active
            };

            db.addOffer(offer);
            
            // Clear form
            document.getElementById('offerTitle').value = '';
            document.getElementById('offerCode').value = '';
            document.getElementById('offerValue').value = '30';
            document.getElementById('offerMinPurchase').value = '0';
            
            loadOffersTable();
            showNotification('Offer added successfully');
        }

        function toggleOfferStatus(id) {
            const offers = db.getAllOffers();
            const offer = offers.find(o => o.id === id);
            
            if (offer) {
                offer.active = !offer.active;
                db.updateOffer(id, offer);
                loadOffersTable();
                showNotification(`Offer ${offer.active ? 'activated' : 'deactivated'}`);
            }
        }

        function deleteOffer(id) {
            if (confirm('Are you sure you want to delete this offer?')) {
                db.deleteOffer(id);
                loadOffersTable();
                showNotification('Offer deleted successfully');
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 1rem 2rem;
                border-radius: 5px;
                z-index: 9999;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
    </script>
</body>
</html>
