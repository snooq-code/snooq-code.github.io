<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #faf7f2 0%, #e2d6ca 100%);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 20px 20px 0 #b65f3a;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo h1 {
            font-size: 3rem;
            color: #b65f3a;
            text-transform: uppercase;
        }

        .login-logo span {
            display: block;
            color: #7d5f4b;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border: 1px solid #e2d6ca;
            border-radius: 12px;
            font-family: 'Outfit';
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #b65f3a;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: #b65f3a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #2c241e;
        }

        .demo-credentials {
            margin-top: 2rem;
            padding: 1rem;
            background: #f0e8de;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #7d5f4b;
        }

        .demo-credentials p {
            margin: 0.3rem 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>SNOOQ</h1>
            <span>admin panel</span>
        </div>

        <div class="form-group">
            <label>username</label>
            <input type="text" class="form-control" id="username" placeholder="admin" value="admin">
        </div>

        <div class="form-group">
            <label>password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" value="admin123">
        </div>

        <button class="login-btn" onclick="login()">login</button>

        <div class="demo-credentials">
            <p><strong>Demo Credentials:</strong></p>
            <p>Username: admin</p>
            <p>Password: admin123</p>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const result = db.adminLogin(username, password);
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                alert('Invalid credentials. Try admin/admin123');
            }
        }
    </script>
</body>
</html>
