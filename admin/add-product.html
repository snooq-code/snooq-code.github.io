<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Add Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .image-upload-section {
            border: 2px dashed #b65f3a;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin: 1rem 0;
            background: #fdf6f0;
            cursor: pointer;
            transition: 0.3s;
        }

        .image-upload-section:hover {
            background: #f0e8de;
            border-color: #2c241e;
        }

        .image-upload-section i {
            font-size: 3rem;
            color: #b65f3a;
            margin-bottom: 1rem;
        }

        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .image-preview-item {
            position: relative;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2d6ca;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 25px;
            height: 25px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .upload-option-btn {
            padding: 1rem;
            background: white;
            border: 1px solid #b65f3a;
            border-radius: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-right: 1rem;
        }

        .upload-option-btn:hover {
            background: #b65f3a;
            color: white;
        }

        .hidden-input {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0e8de;
            border-radius: 2px;
            margin: 1rem 0;
            display: none;
        }

        .progress-bar.fill {
            height: 100%;
            background: #28a745;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html" class="active"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Add New Product</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Product Form -->
            <div class="form-container">
                <form id="productForm" onsubmit="event.preventDefault(); saveProduct();">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select class="form-control" id="category" required>
                                <option value="">Select Category</option>
                                <option value="new">New Arrivals</option>
                                <option value="bestseller">Bestsellers</option>
                                <option value="offer">Offers</option>
                                <option value="regular">Regular</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Subcategory *</label>
                            <select class="form-control" id="subcategory" required>
                                <option value="">Select Subcategory</option>
                                <option value="hoodies">Hoodies</option>
                                <option value="full sleeve">Full Sleeve</option>
                                <option value="half sleeve">Half Sleeve</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Badge</label>
                            <select class="form-control" id="badge">
                                <option value="none">None</option>
                                <option value="new">New</option>
                                <option value="bestseller">Bestseller</option>
                                <option value="offer">Offer</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Price (₹) *</label>
                            <input type="number" class="form-control" id="price" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Original Price (₹)</label>
                            <input type="number" class="form-control" id="originalPrice" min="0">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" class="form-control" id="stock" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Rating (1-5)</label>
                            <input type="number" class="form-control" id="rating" step="0.1" min="0" max="5" value="4.5">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description *</label>
                        <textarea class="form-control" id="description" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Material</label>
                        <input type="text" class="form-control" id="material" value="100% organic cotton">
                    </div>

                    <div class="form-group">
                        <label>Care Instructions</label>
                        <input type="text" class="form-control" id="care" value="Machine wash cold">
                    </div>

                    <div class="form-group">
                        <label>Colors (comma separated)</label>
                        <input type="text" class="form-control" id="colors" placeholder="e.g. terracotta, sand, charcoal, indigo">
                    </div>

                    <div class="form-group">
                        <label>Sizes (comma separated)</label>
                        <input type="text" class="form-control" id="sizes" placeholder="e.g. S, M, L, XL, XXL">
                    </div>

                    <!-- IMAGE UPLOAD SECTION - FIXED -->
                    <div class="form-group">
                        <label>Product Images *</label>
                        
                        <!-- Upload Options -->
                        <div style="margin-bottom: 1rem;">
                            <div class="upload-option-btn" onclick="document.getElementById('fileInput').click()">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Upload Images</span>
                            </div>
                            <span style="color: #7d5f4b; font-size: 0.9rem;"> (Max 5 images, 5MB each)</span>
                        </div>

                        <!-- Hidden File Input -->
                        <input type="file" id="fileInput" class="hidden-input" accept="image/*" multiple onchange="handleImageUpload(event)">

                        <!-- Upload Progress -->
                        <div class="progress-bar" id="uploadProgress">
                            <div class="progress-bar fill" id="progressFill"></div>
                        </div>

                        <!-- Image Preview Grid -->
                        <div class="image-preview-grid" id="imagePreviewGrid"></div>
                        
                        <!-- Hidden input for image data (stores base64 for localStorage) -->
                        <input type="hidden" id="imageData" value="">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="featured"> Featured Product
                            </label>
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="bestseller"> Bestseller
                            </label>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn-primary">Save Product</button>
                        <a href="products.html" class="btn" style="background: #6c757d; color: white; padding: 0.8rem 2rem; text-decoration: none; border-radius: 8px;">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script>
        // Store uploaded images as base64
        let uploadedImages = [];

        // Handle image upload
        function handleImageUpload(event) {
            const files = event.target.files;
            if (!files.length) return;

            // Show progress bar
            document.getElementById('uploadProgress').style.display = 'block';
            
            // Process each file
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // Validate file type
                if (!file.type.startsWith('image/')) {
                    alert('Please select only image files');
                    continue;
                }

                // Validate file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    alert('File size must be less than 5MB');
                    continue;
                }

                // Update progress
                const progress = ((i + 1) / files.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';

                // Read file as data URL
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Store the image data
                    uploadedImages.push({
                        name: file.name,
                        data: e.target.result, // This is the base64 image data
                        type: file.type
                    });

                    // Update preview
                    updateImagePreview();

                    // Update hidden input with image data
                    updateImageDataInput();
                };
                reader.readAsDataURL(file);
            }

            // Hide progress bar after 1 second
            setTimeout(() => {
                document.getElementById('uploadProgress').style.display = 'none';
            }, 1000);
        }

        // Update image preview grid
        function updateImagePreview() {
            const grid = document.getElementById('imagePreviewGrid');
            let html = '';

            uploadedImages.forEach((img, index) => {
                html += `
                    <div class="image-preview-item">
                        <img src="${img.data}" alt="Product image ${index + 1}">
                        <div class="remove-image" onclick="removeImage(${index})">
                            <i class="fas fa-times"></i>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Remove image
        function removeImage(index) {
            uploadedImages.splice(index, 1);
            updateImagePreview();
            updateImageDataInput();
        }

        // Update hidden input with image data (stores in localStorage)
        function updateImageDataInput() {
            // Store only the first 3 images to save space
            const imagesToStore = uploadedImages.slice(0, 3).map(img => img.data);
            document.getElementById('imageData').value = JSON.stringify(imagesToStore);
        }

        // Save product function - FIXED to store images properly
        function saveProduct() {
            // Get form values
            const name = document.getElementById('name').value;
            const category = document.getElementById('category').value;
            const subcategory = document.getElementById('subcategory').value;
            const price = parseInt(document.getElementById('price').value);
            const originalPrice = parseInt(document.getElementById('originalPrice').value) || price;
            const stock = parseInt(document.getElementById('stock').value);
            const description = document.getElementById('description').value;
            const material = document.getElementById('material').value;
            const care = document.getElementById('care').value;
            const badge = document.getElementById('badge').value === 'none' ? null : document.getElementById('badge').value;
            
            // Parse arrays
            const colors = document.getElementById('colors').value.split(',').map(c => c.trim()).filter(c => c);
            const sizes = document.getElementById('sizes').value.split(',').map(s => s.trim()).filter(s => s);
            
            const rating = parseFloat(document.getElementById('rating').value);
            const featured = document.getElementById('featured').checked;
            const bestseller = document.getElementById('bestseller').checked;

            // Validate
            if (!name || !category || !subcategory || !price || !description) {
                alert('Please fill all required fields');
                return;
            }

            // Validate images
            if (uploadedImages.length === 0) {
                alert('Please upload at least one product image');
                return;
            }

            // IMPORTANT: Save images to localStorage
            const imageData = uploadedImages.map(img => img.data);
            
            // Create product object with image data
            const product = {
                id: Date.now(), // Generate unique ID
                name,
                category,
                subcategory,
                price,
                originalPrice,
                stock,
                description,
                material,
                care,
                badge,
                colors: colors.length ? colors : ['terracotta', 'sand', 'charcoal', 'indigo'],
                sizes: sizes.length ? sizes : ['S', 'M', 'L', 'XL', 'XXL'],
                images: imageData, // Store actual image data, not just filenames!
                rating,
                reviews: 0,
                featured,
                bestseller,
                dateAdded: new Date().toISOString().split('T')[0]
            };

            // Get existing products
            let products = JSON.parse(localStorage.getItem('snooq_products')) || [];
            
            // Add new product
            products.push(product);
            
            // Save to localStorage
            localStorage.setItem('snooq_products', JSON.stringify(products));
            
            alert('✅ Product added successfully with images!');
            window.location.href = 'products.html';
        }
    </script>
</body>
</html>
