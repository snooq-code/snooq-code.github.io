<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html" class="active"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Products</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Actions Bar -->
            <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
                <div class="search-bar" style="width: 300px;">
                    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
                </div>
                <a href="add-product.html" class="btn-primary" style="padding: 0.8rem 2rem; text-decoration: none;">+ Add New Product</a>
            </div>

            <!-- Products Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Badge</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadProductsTable();
        });

        function loadProductsTable() {
            const products = db.getAllProducts();
            const tbody = document.getElementById('productsTableBody');

            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No products found</td></tr>';
                return;
            }

            let html = '';
            products.forEach(product => {
                const badgeClass = product.badge === 'offer' ? 'status-pending' : 
                                  product.badge === 'new' ? 'status-completed' : 
                                  product.badge === 'bestseller' ? 'status-shipped' : '';
                
                html += `
                    <tr>
                        <td>#${product.id}</td>
                        <td>
                            <img src="../assets/images/${product.images[0]}" alt="${product.name}" 
                                 style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;"
                                 onerror="this.src='https://via.placeholder.com/50x50?text=Product'">
                        </td>
                        <td>${product.name}</td>
                        <td>${product.category} / ${product.subcategory}</td>
                        <td>₹${product.price} <span style="color: #999; text-decoration: line-through;">₹${product.originalPrice}</span></td>
                        <td>
                            <span style="color: ${product.stock < 10 ? '#dc3545' : '#28a745'}; font-weight: 600;">
                                ${product.stock}
                            </span>
                        </td>
                        <td>
                            ${product.badge ? `<span class="status-badge ${badgeClass}">${product.badge}</span>` : '-'}
                        </td>
                        <td>
                            <a href="edit-product.html?id=${product.id}" class="btn-edit">Edit</a>
                            <button onclick="deleteProduct(${product.id})" class="btn-delete">Delete</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const products = db.getAllProducts();
            const tbody = document.getElementById('productsTableBody');

            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.category.toLowerCase().includes(searchTerm) ||
                p.subcategory.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No products found</td></tr>';
                return;
            }

            let html = '';
            filtered.forEach(product => {
                const badgeClass = product.badge === 'offer' ? 'status-pending' : 
                                  product.badge === 'new' ? 'status-completed' : 
                                  product.badge === 'bestseller' ? 'status-shipped' : '';
                
                html += `
                    <tr>
                        <td>#${product.id}</td>
                        <td>
                            <img src="../assets/images/${product.images[0]}" alt="${product.name}" 
                                 style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;"
                                 onerror="this.src='https://via.placeholder.com/50x50?text=Product'">
                        </td>
                        <td>${product.name}</td>
                        <td>${product.category} / ${product.subcategory}</td>
                        <td>₹${product.price}</td>
                        <td>${product.stock}</td>
                        <td>${product.badge || '-'}</td>
                        <td>
                            <a href="edit-product.html?id=${product.id}" class="btn-edit">Edit</a>
                            <button onclick="deleteProduct(${product.id})" class="btn-delete">Delete</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                db.deleteProduct(id);
                loadProductsTable();
                showNotification('Product deleted successfully');
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 1rem 2rem;
                border-radius: 5px;
                z-index: 9999;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
    </script>
</body>
</html>
