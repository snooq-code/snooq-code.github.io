<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .filter-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-width: 200px;
        }
        
        .order-details-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        
        .order-details-modal.active, .modal-overlay.active {
            display: block;
        }
        
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html" class="active"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Order Management</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <select class="filter-select" id="statusFilter" onchange="filterOrders()">
                    <option value="all">All Orders</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
                
                <select class="filter-select" id="dateFilter" onchange="filterOrders()">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
                
                <div class="search-bar" style="flex: 1;">
                    <input type="text" id="searchInput" placeholder="Search by order ID or customer..." onkeyup="filterOrders()">
                </div>
            </div>

            <!-- Orders Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr>
                            <td colspan="8" style="text-align: center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeOrderModal()"></div>
    <div class="order-details-modal" id="orderModal">
        <span class="close-modal" onclick="closeOrderModal()">&times;</span>
        <div id="orderDetailsContent"></div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadOrdersTable();
        });

        function loadOrdersTable() {
            let orders = db.getOrders();
            
            // Apply filters
            const statusFilter = document.getElementById('statusFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';

            if (statusFilter !== 'all') {
                orders = orders.filter(o => o.status === statusFilter);
            }

            if (dateFilter !== 'all') {
                const today = new Date();
                const startDate = new Date();
                
                if (dateFilter === 'today') {
                    startDate.setHours(0,0,0,0);
                } else if (dateFilter === 'week') {
                    startDate.setDate(today.getDate() - 7);
                } else if (dateFilter === 'month') {
                    startDate.setMonth(today.getMonth() - 1);
                }
                
                orders = orders.filter(o => new Date(o.date) >= startDate);
            }

            if (searchTerm) {
                orders = orders.filter(o => 
                    o.orderNumber.toLowerCase().includes(searchTerm) ||
                    (o.customerName && o.customerName.toLowerCase().includes(searchTerm))
                );
            }

            const tbody = document.getElementById('ordersTableBody');

            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">No orders found</td></tr>';
                return;
            }

            // Sort by date (newest first)
            orders.sort((a, b) => new Date(b.date) - new Date(a.date));

            let html = '';
            orders.forEach(order => {
                const date = new Date(order.date).toLocaleDateString();
                const itemCount = order.items.reduce((sum, item) => sum + item.quantity, 0);
                
                html += `
                    <tr>
                        <td><strong>${order.orderNumber}</strong></td>
                        <td>${date}</td>
                        <td>${order.customerName || 'Guest'}</td>
                        <td>${itemCount} items</td>
                        <td><strong>₹${order.total}</strong></td>
                        <td>${order.paymentMethod || 'COD'}</td>
                        <td>
                            <select onchange="updateOrderStatus(${order.id}, this.value)" class="status-badge status-${order.status}">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>
                            <button onclick="viewOrderDetails(${order.id})" class="btn-edit">View</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function filterOrders() {
            loadOrdersTable();
        }

        function updateOrderStatus(orderId, status) {
            db.updateOrderStatus(orderId, status);
            loadOrdersTable();
            showNotification('Order status updated');
        }

        function viewOrderDetails(orderId) {
            const order = db.getOrderById(orderId);
            if (!order) return;

            const date = new Date(order.date).toLocaleString();
            
            let itemsHtml = '';
            order.items.forEach(item => {
                itemsHtml += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>₹${item.price}</td>
                        <td>₹${item.price * item.quantity}</td>
                    </tr>
                `;
            });

            const content = `
                <h2 style="margin-bottom: 1rem;">Order ${order.orderNumber}</h2>
                
                <div style="margin-bottom: 1.5rem;">
                    <p><strong>Date:</strong> ${date}</p>
                    <p><strong>Status:</strong> <span class="status-badge status-${order.status}">${order.status}</span></p>
                    <p><strong>Payment Method:</strong> ${order.paymentMethod || 'COD'}</p>
                </div>

                <h3>Customer Details</h3>
                <div style="margin-bottom: 1.5rem;">
                    <p><strong>Name:</strong> ${order.customerName || 'Guest'}</p>
                    <p><strong>Email:</strong> ${order.customerEmail || 'N/A'}</p>
                    <p><strong>Phone:</strong> ${order.customerPhone || 'N/A'}</p>
                </div>

                <h3>Shipping Address</h3>
                <div style="margin-bottom: 1.5rem;">
                    <p>${order.shippingAddress?.address || 'N/A'}</p>
                    <p>${order.shippingAddress?.city || ''} - ${order.shippingAddress?.pincode || ''}</p>
                </div>

                <h3>Order Items</h3>
                <table style="width: 100%; margin-bottom: 1.5rem;">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" style="text-align: right;"><strong>Total:</strong></td>
                            <td><strong>₹${order.total}</strong></td>
                        </tr>
                    </tfoot>
                </table>

                <div style="display: flex; gap: 1rem;">
                    <button class="btn-primary" onclick="printOrder(${order.id})">Print Invoice</button>
                    <button class="btn" onclick="closeOrderModal()">Close</button>
                </div>
            `;

            document.getElementById('orderDetailsContent').innerHTML = content;
            document.getElementById('orderModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function printOrder(orderId) {
            alert('Printing invoice...');
            // In a real app, this would generate a printable invoice
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 1rem 2rem;
                border-radius: 5px;
                z-index: 9999;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
    </script>
</body>
</html>
