<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Customers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html" class="active"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Customer Management</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-bar" style="margin-bottom: 2rem;">
                <input type="text" id="searchInput" placeholder="Search customers by name, email or phone..." onkeyup="searchCustomers()">
            </div>

            <!-- Customers Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Orders</th>
                            <th>Total Spent</th>
                            <th>Joined</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody">
                        <tr>
                            <td colspan="9" style="text-align: center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadCustomersTable();
        });

        function loadCustomersTable() {
            // In a real app, this would come from database
            // For demo, create sample customers from orders
            const orders = db.getOrders();
            const customers = [];
            const customerMap = new Map();

            orders.forEach(order => {
                if (order.customerEmail && !customerMap.has(order.customerEmail)) {
                    customerMap.set(order.customerEmail, {
                        id: customers.length + 1,
                        name: order.customerName || 'Guest',
                        email: order.customerEmail,
                        phone: order.customerPhone || 'N/A',
                        orders: 1,
                        total: order.total,
                        joinDate: order.date,
                        status: 'active'
                    });
                } else if (order.customerEmail) {
                    const existing = customerMap.get(order.customerEmail);
                    existing.orders++;
                    existing.total += order.total;
                }
            });

            // Add some sample customers if none exist
            if (customerMap.size === 0) {
                customerMap.set('john@example.com', {
                    id: 1,
                    name: 'John Doe',
                    email: 'john@example.com',
                    phone: '9876543210',
                    orders: 3,
                    total: 5499,
                    joinDate: '2024-01-15',
                    status: 'active'
                });
                customerMap.set('jane@example.com', {
                    id: 2,
                    name: 'Jane Smith',
                    email: 'jane@example.com',
                    phone: '9876543211',
                    orders: 2,
                    total: 3299,
                    joinDate: '2024-02-01',
                    status: 'active'
                });
            }

            const customersList = Array.from(customerMap.values());
            const tbody = document.getElementById('customersTableBody');

            let html = '';
            customersList.forEach(customer => {
                const joinDate = new Date(customer.joinDate).toLocaleDateString();
                
                html += `
                    <tr>
                        <td>#${customer.id}</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <div style="width: 40px; height: 40px; background: #b65f3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">
                                    ${customer.name.charAt(0)}
                                </div>
                                ${customer.name}
                            </div>
                        </td>
                        <td>${customer.email}</td>
                        <td>${customer.phone}</td>
                        <td>${customer.orders}</td>
                        <td><strong>₹${customer.total}</strong></td>
                        <td>${joinDate}</td>
                        <td>
                            <span class="status-badge status-completed">Active</span>
                        </td>
                        <td>
                            <button onclick="viewCustomer(${customer.id})" class="btn-edit">View</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function searchCustomers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            // Re-implement search logic
            loadCustomersTable(); // In real app, would filter
        }

        function viewCustomer(id) {
            alert(`View customer details for ID: ${id}\nThis would show order history and customer details.`);
        }
    </script>
</body>
</html>
