<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SNOOQ · shop all</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 2rem;
        }
        .results-count {
            color: #7d5f4b;
            font-size: 0.9rem;
        }
        .sort-select {
            padding: 0.5rem 1rem;
            border: 1px solid #e2d6ca;
            border-radius: 30px;
            background: white;
            font-family: 'Outfit';
        }
        .load-more {
            text-align: center;
            margin: 3rem 0;
        }
        .load-more-btn {
            background: transparent;
            border: 1px solid #b65f3a;
            color: #b65f3a;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .load-more-btn:hover {
            background: #b65f3a;
            color: white;
        }
        .no-products {
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MOBILE HEADER -->
        <div class="mobile-header">
            <div class="logo" onclick="window.location='index.html'">SNOOQ<span>india</span></div>
            <div class="right-actions">
                <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i><span class="cart-count" style="display:none;">0</span></button>
                <button class="icon-btn" id="bagToggle"><i class="fas fa-shopping-bag"></i></button>
                <button class="icon-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>

        <!-- MOBILE MENU -->
        <div class="menu-overlay" id="mobileMenu">
            <div class="menu-grid">
                <div class="menu-cat">
                    <p>shop</p>
                    <ul>
                        <li><a href="shop.html?filter=new">new arrivals</a></li>
                        <li><a href="shop.html?filter=bestseller">bestsellers</a></li>
                        <li><a href="shop.html?filter=offer">offers</a></li>
                        <li><a href="shop.html?cat=hoodies">hoodies</a></li>
                        <li><a href="shop.html?cat=full sleeve">full sleeve</a></li>
                        <li><a href="shop.html?cat=half sleeve">half sleeve</a></li>
                    </ul>
                </div>
                <div class="menu-cat">
                    <p>discover</p>
                    <ul>
                        <li><a href="lookbook.html">lookbook</a></li>
                        <li><a href="#">studio</a></li>
                        <li><a href="#">sustainability</a></li>
                    </ul>
                </div>
            </div>
            <div class="menu-account">
                <div class="account-row">
                    <a href="profile.html"><i class="far fa-user"></i> profile</a>
                    <a href="wishlist.html"><i class="far fa-heart"></i> wishlist</a>
                    <a href="orders.html"><i class="fas fa-box"></i> orders</a>
                </div>
            </div>
        </div>

        <!-- PAGE HEADER -->
        <div class="shop-header">
            <h1 class="page-title">shop all</h1>
            <span class="results-count" id="resultsCount">48 products</span>
        </div>

        <!-- FILTER SECTION -->
        <div class="filter-section">
            <div class="filter-group">
                <span class="filter-label"><i class="fas fa-filter"></i></span>
                <button class="filter-chip active" data-filter="all" onclick="applyFilter('all')"><i class="fas fa-th-large"></i> all</button>
                <button class="filter-chip" data-filter="new" onclick="applyFilter('new')"><i class="fas fa-star"></i> new</button>
                <button class="filter-chip" data-filter="bestseller" onclick="applyFilter('bestseller')"><i class="fas fa-fire"></i> bestselling</button>
                <button class="filter-chip" data-filter="offer" onclick="applyFilter('offer')"><i class="fas fa-tags"></i> offers</button>
            </div>
            <select class="sort-select" id="sortSelect" onchange="applySort(this.value)">
                <option value="default">sort by: featured</option>
                <option value="price-low">price: low to high</option>
                <option value="price-high">price: high to low</option>
                <option value="newest">newest first</option>
            </select>
        </div>

        <!-- CATEGORY CHIPS -->
        <div class="category-scroll">
            <span class="cat-item" onclick="applyCategory('all')"><i class="fas fa-tshirt"></i> all</span>
            <span class="cat-item" onclick="applyCategory('hoodies')"><i class="fas fa-tshirt"></i> hoodies</span>
            <span class="cat-item" onclick="applyCategory('full sleeve')"><i class="fas fa-tshirt"></i> full sleeve</span>
            <span class="cat-item" onclick="applyCategory('half sleeve')"><i class="fas fa-tshirt"></i> half sleeve</span>
        </div>

        <!-- PRODUCTS GRID -->
        <div class="all-products-grid" id="productsGrid">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <!-- LOAD MORE BUTTON -->
        <div class="load-more">
            <button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreProducts()">load more</button>
        </div>
    </div>

    <!-- BOTTOM POPUP -->
    <div class="bottom-popup">
        <div class="bottom-icon" onclick="window.location='index.html'">
            <i class="fas fa-home"></i>
            <span>home</span>
        </div>
        <div class="bottom-icon" onclick="window.location='wishlist.html'">
            <i class="far fa-heart"></i>
            <span>favourite</span>
        </div>
        <div class="bottom-icon" onclick="window.location='orders.html'">
            <i class="fas fa-box"></i>
            <span>orders</span>
        </div>
        <div class="bottom-icon active" onclick="window.location='profile.html'">
            <i class="far fa-user"></i>
            <span>profile</span>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentPage = 1;
        let currentFilter = 'all';
        let currentCategory = 'all';
        let currentSort = 'default';
        let allProducts = [];
        const productsPerPage = 12;

        // Load products on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            currentFilter = urlParams.get('filter') || 'all';
            currentCategory = urlParams.get('cat') || 'all';
            
            // Highlight active filter
            document.querySelectorAll('.filter-chip').forEach(chip => {
                if (chip.dataset.filter === currentFilter) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });

            // Load products
            loadProducts();
        });

        function loadProducts() {
            allProducts = db.getAllProducts();
            
            // Apply filter
            if (currentFilter !== 'all') {
                if (currentFilter === 'new') {
                    allProducts = allProducts.filter(p => p.badge === 'new');
                } else if (currentFilter === 'bestseller') {
                    allProducts = allProducts.filter(p => p.bestseller === true);
                } else if (currentFilter === 'offer') {
                    allProducts = allProducts.filter(p => p.badge === 'offer');
                }
            }

            // Apply category
            if (currentCategory !== 'all') {
                allProducts = allProducts.filter(p => p.subcategory === currentCategory);
            }

            // Apply sort
            applySorting();

            // Update results count
            document.getElementById('resultsCount').textContent = allProducts.length + ' products';
            
            // Reset page and display
            currentPage = 1;
            displayProducts();
        }

        function applySorting() {
            if (currentSort === 'price-low') {
                allProducts.sort((a, b) => a.price - b.price);
            } else if (currentSort === 'price-high') {
                allProducts.sort((a, b) => b.price - a.price);
            } else if (currentSort === 'newest') {
                allProducts.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
            }
        }

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            const start = 0;
            const end = currentPage * productsPerPage;
            const productsToShow = allProducts.slice(start, end);

            if (productsToShow.length === 0) {
                grid.innerHTML = '<div class="no-products"><i class="fas fa-tshirt" style="font-size: 3rem; color: #b65f3a; opacity: 0.5;"></i><h3>No products found</h3><p>Try a different category or filter</p><button class="btn" onclick="clearFilters()">clear filters</button></div>';
                document.getElementById('loadMoreBtn').style.display = 'none';
                return;
            }

            let html = '';
            productsToShow.forEach(product => {
                const badgeClass = product.badge === 'offer' ? 'offer' : 
                                  product.badge === 'new' ? 'new' : 
                                  product.badge === 'bestseller' ? 'bestseller' : '';
                
                const badgeHtml = badgeClass ? `<span class="badge ${badgeClass}">${product.badge}</span>` : '';
                
                const priceHtml = product.originalPrice > product.price ? 
                    `<span class="old-price">₹${product.originalPrice}</span> ₹${product.price}` : 
                    `₹${product.price}`;

                html += `
                    <div class="product-item" onclick="viewProduct(${product.id})">
                        ${badgeHtml}
                        <div class="product-image">
                            <img src="assets/images/${product.images[0]}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x300?text=${product.name}'">
                        </div>
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <div class="price">${priceHtml}</div>
                            <button class="shop-action" onclick="event.stopPropagation(); addToCart(${product.id})">secure</button>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;

            // Show/hide load more button
            if (end >= allProducts.length) {
                document.getElementById('loadMoreBtn').style.display = 'none';
            } else {
                document.getElementById('loadMoreBtn').style.display = 'block';
            }
        }

        function loadMoreProducts() {
            currentPage++;
            displayProducts();
        }

        function applyFilter(filter) {
            currentFilter = filter;
            currentPage = 1;
            loadProducts();
            
            // Update URL without reload
            const url = new URL(window.location);
            url.searchParams.set('filter', filter);
            window.history.pushState({}, '', url);
        }

        function applyCategory(category) {
            currentCategory = category;
            currentPage = 1;
            loadProducts();
            
            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('cat', category);
            window.history.pushState({}, '', url);
        }

        function applySort(sort) {
            currentSort = sort;
            applySorting();
            displayProducts();
        }

        function clearFilters() {
            currentFilter = 'all';
            currentCategory = 'all';
            currentSort = 'default';
            document.getElementById('sortSelect').value = 'default';
            loadProducts();
            
            // Update URL
            window.history.pushState({}, '', 'shop.html');
        }

        function viewProduct(id) {
            window.location.href = `product.html?id=${id}`;
        }

        function addToCart(productId) {
            const result = db.addToCart(productId, 1);
            if (result.success) {
                updateCartCount();
                alert('Product added to cart!');
            }
        }
    </script>
</body>
</html>
