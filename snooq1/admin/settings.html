<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Settings</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Settings Form -->
            <div class="form-container">
                <h2 style="margin-bottom: 2rem;">General Settings</h2>
                
                <form id="settingsForm" onsubmit="event.preventDefault(); saveSettings();">
                    <div class="form-section">
                        <h3>Store Information</h3>
                        <div class="form-group">
                            <label>Store Name</label>
                            <input type="text" class="form-control" id="siteName" value="SNOOQ">
                        </div>
                        
                        <div class="form-group">
                            <label>Tagline</label>
                            <input type="text" class="form-control" id="tagline" value="indian aesthetic">
                        </div>
                        
                        <div class="form-group">
                            <label>Currency</label>
                            <select class="form-control" id="currency">
                                <option value="₹" selected>Indian Rupee (₹)</option>
                                <option value="$">US Dollar ($)</option>
                                <option value="€">Euro (€)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Shipping Settings</h3>
                        
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="freeShipping" checked> Enable Free Shipping
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label>Free Shipping Minimum Amount (₹)</label>
                            <input type="number" class="form-control" id="shippingAmount" value="999" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Standard Shipping Charge (₹)</label>
                            <input type="number" class="form-control" id="shippingCharge" value="99" min="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Return Days</label>
                            <input type="number" class="form-control" id="returnDays" value="7" min="0">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Payment Settings</h3>
                        
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="paymentCod" checked> Cash on Delivery
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="paymentCard" checked> Credit/Debit Card
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="paymentUpi" checked> UPI
                            </label>
                        </div>
                        
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="paymentNetbanking" checked> Net Banking
                            </label>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Email Settings</h3>
                        
                        <div class="form-group">
                            <label>Admin Email</label>
                            <input type="email" class="form-control" id="adminEmail" value="admin@snooq.com">
                        </div>
                        
                        <div class="form-group">
                            <label>Order Confirmation Email</label>
                            <input type="email" class="form-control" id="orderEmail" value="orders@snooq.com">
                        </div>
                        
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="emailNotifications" checked> Send order notifications
                            </label>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Social Media Links</h3>
                        
                        <div class="form-group">
                            <label>Instagram</label>
                            <input type="url" class="form-control" id="socialInstagram" value="https://instagram.com/snooqindia">
                        </div>
                        
                        <div class="form-group">
                            <label>Facebook</label>
                            <input type="url" class="form-control" id="socialFacebook" value="https://facebook.com/snooq">
                        </div>
                        
                        <div class="form-group">
                            <label>Pinterest</label>
                            <input type="url" class="form-control" id="socialPinterest" value="https://pinterest.com/snooq">
                        </div>
                        
                        <div class="form-group">
                            <label>YouTube</label>
                            <input type="url" class="form-control" id="socialYoutube" value="https://youtube.com/snooq">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Admin Account</h3>
                        
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" class="form-control" id="adminUsername" value="admin">
                        </div>
                        
                        <div class="form-group">
                            <label>New Password (leave blank to keep current)</label>
                            <input type="password" class="form-control" id="adminPassword">
                        </div>
                        
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" class="form-control" id="adminConfirmPassword">
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn-primary">Save Settings</button>
                        <button type="button" class="btn" onclick="resetSettings()" style="background: #6c757d; color: white;">Reset to Default</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
        });

        function loadSettings() {
            const settings = db.getSettings();
            
            document.getElementById('siteName').value = settings.siteName || 'SNOOQ';
            document.getElementById('tagline').value = settings.tagline || 'indian aesthetic';
            document.getElementById('currency').value = settings.currency || '₹';
            document.getElementById('freeShipping').checked = settings.freeShipping !== false;
            document.getElementById('shippingAmount').value = settings.shippingAmount || 999;
            document.getElementById('shippingCharge').value = settings.shippingCharge || 99;
            document.getElementById('returnDays').value = settings.returnDays || 7;
            document.getElementById('adminEmail').value = settings.adminEmail || 'admin@snooq.com';
            document.getElementById('orderEmail').value = settings.orderEmail || 'orders@snooq.com';
            document.getElementById('emailNotifications').checked = settings.emailNotifications !== false;
            document.getElementById('socialInstagram').value = settings.socialInstagram || 'https://instagram.com/snooqindia';
            document.getElementById('socialFacebook').value = settings.socialFacebook || 'https://facebook.com/snooq';
            document.getElementById('socialPinterest').value = settings.socialPinterest || 'https://pinterest.com/snooq';
            document.getElementById('socialYoutube').value = settings.socialYoutube || 'https://youtube.com/snooq';
            document.getElementById('adminUsername').value = settings.adminUsername || 'admin';
            
            // Payment settings
            document.getElementById('paymentCod').checked = settings.paymentCod !== false;
            document.getElementById('paymentCard').checked = settings.paymentCard !== false;
            document.getElementById('paymentUpi').checked = settings.paymentUpi !== false;
            document.getElementById('paymentNetbanking').checked = settings.paymentNetbanking !== false;
        }

        function saveSettings() {
            const settings = {
                siteName: document.getElementById('siteName').value,
                tagline: document.getElementById('tagline').value,
                currency: document.getElementById('currency').value,
                freeShipping: document.getElementById('freeShipping').checked,
                shippingAmount: parseInt(document.getElementById('shippingAmount').value),
                shippingCharge: parseInt(document.getElementById('shippingCharge').value),
                returnDays: parseInt(document.getElementById('returnDays').value),
                adminEmail: document.getElementById('adminEmail').value,
                orderEmail: document.getElementById('orderEmail').value,
                emailNotifications: document.getElementById('emailNotifications').checked,
                socialInstagram: document.getElementById('socialInstagram').value,
                socialFacebook: document.getElementById('socialFacebook').value,
                socialPinterest: document.getElementById('socialPinterest').value,
                socialYoutube: document.getElementById('socialYoutube').value,
                adminUsername: document.getElementById('adminUsername').value,
                paymentCod: document.getElementById('paymentCod').checked,
                paymentCard: document.getElementById('paymentCard').checked,
                paymentUpi: document.getElementById('paymentUpi').checked,
                paymentNetbanking: document.getElementById('paymentNetbanking').checked
            };

            // Handle password change
            const newPassword = document.getElementById('adminPassword').value;
            const confirmPassword = document.getElementById('adminConfirmPassword').value;
            
            if (newPassword) {
                if (newPassword !== confirmPassword) {
                    alert('Passwords do not match');
                    return;
                }
                // In a real app, you'd hash the password
                settings.adminPassword = newPassword;
            }

            db.updateSettings(settings);
            
            // Update admin credentials if password changed
            if (newPassword) {
                const admin = JSON.parse(localStorage.getItem('snooq_admin')) || {};
                admin.username = settings.adminUsername;
                if (newPassword) admin.password = newPassword;
                localStorage.setItem('snooq_admin', JSON.stringify(admin));
            }

            showNotification('Settings saved successfully');
        }

        function resetSettings() {
            if (confirm('Reset all settings to default values?')) {
                const defaultSettings = {
                    siteName: 'SNOOQ',
                    tagline: 'indian aesthetic',
                    currency: '₹',
                    freeShipping: true,
                    shippingAmount: 999,
                    shippingCharge: 99,
                    returnDays: 7,
                    adminEmail: 'admin@snooq.com',
                    orderEmail: 'orders@snooq.com',
                    emailNotifications: true,
                    socialInstagram: 'https://instagram.com/snooqindia',
                    socialFacebook: 'https://facebook.com/snooq',
                    socialPinterest: 'https://pinterest.com/snooq',
                    socialYoutube: 'https://youtube.com/snooq',
                    adminUsername: 'admin',
                    paymentCod: true,
                    paymentCard: true,
                    paymentUpi: true,
                    paymentNetbanking: true
                };
                
                db.updateSettings(defaultSettings);
                loadSettings();
                showNotification('Settings reset to default');
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 1rem 2rem;
                border-radius: 5px;
                z-index: 9999;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
    </script>
</body>
</html>
