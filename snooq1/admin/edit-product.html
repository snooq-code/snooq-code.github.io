<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOQ Admin · Edit Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                SNOOQ<span>admin</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="products.html" class="active"><i class="fas fa-tshirt"></i> <span>Products</span></a></li>
                <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                <li><a href="customers.html"><i class="fas fa-users"></i> <span>Customers</span></a></li>
                <li><a href="banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
                <li><a href="offers.html"><i class="fas fa-tags"></i> <span>Offers</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 class="page-title">Edit Product</h1>
                <div class="admin-profile">
                    <span>admin</span>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn" style="cursor: pointer;"></i>
                </div>
            </div>

            <!-- Product Form -->
            <div class="form-container">
                <form id="productForm" onsubmit="event.preventDefault(); updateProduct();">
                    <input type="hidden" id="productId">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select class="form-control" id="category" required>
                                <option value="">Select Category</option>
                                <option value="new">New Arrivals</option>
                                <option value="bestseller">Bestsellers</option>
                                <option value="offer">Offers</option>
                                <option value="regular">Regular</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Subcategory *</label>
                            <select class="form-control" id="subcategory" required>
                                <option value="">Select Subcategory</option>
                                <option value="hoodies">Hoodies</option>
                                <option value="full sleeve">Full Sleeve</option>
                                <option value="half sleeve">Half Sleeve</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Badge</label>
                            <select class="form-control" id="badge">
                                <option value="none">None</option>
                                <option value="new">New</option>
                                <option value="bestseller">Bestseller</option>
                                <option value="offer">Offer</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Price (₹) *</label>
                            <input type="number" class="form-control" id="price" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Original Price (₹)</label>
                            <input type="number" class="form-control" id="originalPrice" min="0">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" class="form-control" id="stock" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Rating (1-5)</label>
                            <input type="number" class="form-control" id="rating" step="0.1" min="0" max="5">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description *</label>
                        <textarea class="form-control" id="description" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Material</label>
                        <input type="text" class="form-control" id="material">
                    </div>

                    <div class="form-group">
                        <label>Care Instructions</label>
                        <input type="text" class="form-control" id="care">
                    </div>

                    <div class="form-group">
                        <label>Colors (comma separated)</label>
                        <input type="text" class="form-control" id="colors" placeholder="e.g. terracotta, sand, charcoal, indigo">
                    </div>

                    <div class="form-group">
                        <label>Sizes (comma separated)</label>
                        <input type="text" class="form-control" id="sizes" placeholder="e.g. S, M, L, XL, XXL">
                    </div>

                    <div class="form-group">
                        <label>Image URLs (one per line)</label>
                        <textarea class="form-control" id="images" rows="3" placeholder="product1.jpg"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="featured"> Featured Product
                            </label>
                        </div>
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" id="bestseller"> Bestseller
                            </label>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn-primary">Update Product</button>
                        <a href="products.html" class="btn" style="background: #6c757d; color: white; padding: 0.8rem 2rem; text-decoration: none; border-radius: 8px;">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (productId) {
                loadProductForEdit(productId);
            } else {
                window.location.href = 'products.html';
            }
        });

        function loadProductForEdit(productId) {
            const product = db.getProductById(productId);
            
            if (!product) {
                window.location.href = 'products.html';
                return;
            }

            document.getElementById('productId').value = product.id;
            document.getElementById('name').value = product.name;
            document.getElementById('category').value = product.category;
            document.getElementById('subcategory').value = product.subcategory;
            document.getElementById('price').value = product.price;
            document.getElementById('originalPrice').value = product.originalPrice;
            document.getElementById('stock').value = product.stock;
            document.getElementById('description').value = product.description;
            document.getElementById('material').value = product.material || '';
            document.getElementById('care').value = product.care || '';
            document.getElementById('rating').value = product.rating || 4.5;
            
            document.getElementById('badge').value = product.badge || 'none';
            document.getElementById('colors').value = product.colors ? product.colors.join(', ') : '';
            document.getElementById('sizes').value = product.sizes ? product.sizes.join(', ') : '';
            document.getElementById('images').value = product.images ? product.images.join('\n') : '';
            
            document.getElementById('featured').checked = product.featured || false;
            document.getElementById('bestseller').checked = product.bestseller || false;
        }

        function updateProduct() {
            const productId = document.getElementById('productId').value;
            
            // Get form values
            const name = document.getElementById('name').value;
            const category = document.getElementById('category').value;
            const subcategory = document.getElementById('subcategory').value;
            const price = parseInt(document.getElementById('price').value);
            const originalPrice = parseInt(document.getElementById('originalPrice').value) || price;
            const stock = parseInt(document.getElementById('stock').value);
            const description = document.getElementById('description').value;
            const material = document.getElementById('material').value;
            const care = document.getElementById('care').value;
            const rating = parseFloat(document.getElementById('rating').value);
            const badge = document.getElementById('badge').value === 'none' ? null : document.getElementById('badge').value;
            
            // Parse arrays
            const colors = document.getElementById('colors').value.split(',').map(c => c.trim()).filter(c => c);
            const sizes = document.getElementById('sizes').value.split(',').map(s => s.trim()).filter(s => s);
            const images = document.getElementById('images').value.split('\n').map(i => i.trim()).filter(i => i);
            
            const featured = document.getElementById('featured').checked;
            const bestseller = document.getElementById('bestseller').checked;

            // Validate
            if (!name || !category || !subcategory || !price || !description) {
                alert('Please fill all required fields');
                return;
            }

            // Update product object
            const updatedProduct = {
                name,
                category,
                subcategory,
                price,
                originalPrice,
                stock,
                description,
                material,
                care,
                badge,
                colors: colors.length ? colors : ['terracotta', 'sand', 'charcoal', 'indigo'],
                sizes: sizes.length ? sizes : ['S', 'M', 'L', 'XL', 'XXL'],
                images: images.length ? images : ['product.jpg'],
                rating,
                featured,
                bestseller
            };

            // Save to database
            db.updateProduct(productId, updatedProduct);
            
            alert('Product updated successfully!');
            window.location.href = 'products.html';
        }
    </script>
</body>
</html>
