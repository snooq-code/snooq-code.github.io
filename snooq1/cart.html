<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SNOOQ · shopping cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 2rem;
        }

        .cart-count-badge {
            background: #b65f3a;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .cart-items {
            margin: 2rem 0;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 1rem;
            padding: 1rem;
            background: white;
            border: 1px solid #e2d6ca;
            border-radius: 16px;
            margin-bottom: 1rem;
            position: relative;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            background: #f0e8de;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-details {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .cart-item-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .cart-item-variants {
            font-size: 0.9rem;
            color: #7d5f4b;
        }

        .cart-item-price {
            font-weight: 600;
            color: #b65f3a;
            font-size: 1.2rem;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .cart-quantity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e2d6ca;
            border-radius: 30px;
            padding: 0.2rem 0.5rem;
        }

        .cart-quantity button {
            background: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: #4a3f38;
        }

        .cart-quantity button:hover {
            background: #f0e8de;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .cart-summary {
            background: white;
            border: 1px solid #b65f3a;
            border-radius: 20px;
            padding: 1.5rem;
            margin: 2rem 0;
            box-shadow: 5px 5px 0 #7d5f4b;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #f0e8de;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            font-weight: 700;
            font-size: 1.3rem;
            color: #b65f3a;
            border-top: 2px solid #b65f3a;
            margin-top: 0.5rem;
        }

        .free-shipping-note {
            background: #d4edda;
            color: #155724;
            padding: 0.8rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-size: 0.9rem;
            text-align: center;
        }

        .coupon-section {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .coupon-input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid #e2d6ca;
            border-radius: 30px;
            font-family: 'Outfit';
        }

        .apply-coupon {
            padding: 0.8rem 1.5rem;
            background: #4a3f38;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        .apply-coupon:hover {
            background: #b65f3a;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: #b65f3a;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
            font-size: 1.1rem;
        }

        .checkout-btn:hover {
            background: #2c241e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(182, 95, 58, 0.3);
        }

        .continue-shopping {
            display: block;
            text-align: center;
            margin: 2rem 0;
            color: #b65f3a;
            text-decoration: none;
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2d6ca;
        }

        .empty-cart i {
            font-size: 4rem;
            color: #b65f3a;
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        .empty-cart h3 {
            margin-bottom: 0.5rem;
        }

        .empty-cart p {
            color: #7d5f4b;
            margin-bottom: 2rem;
        }

        .savings-badge {
            background: #28a745;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        .price-details {
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MOBILE HEADER -->
        <div class="mobile-header">
            <div class="logo" onclick="window.location='index.html'">SNOOQ<span>india</span></div>
            <div class="right-actions">
                <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i></button>
                <button class="icon-btn" id="bagToggle"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount" style="display:none;">0</span></button>
                <button class="icon-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>

        <!-- MOBILE MENU -->
        <div class="menu-overlay" id="mobileMenu">
            <div class="menu-grid">
                <div class="menu-cat">
                    <p>shop</p>
                    <ul>
                        <li><a href="shop.html?filter=new">new arrivals</a></li>
                        <li><a href="shop.html?filter=bestseller">bestsellers</a></li>
                        <li><a href="shop.html?filter=offer">offers</a></li>
                        <li><a href="shop.html?cat=hoodies">hoodies</a></li>
                        <li><a href="shop.html?cat=full%20sleeve">full sleeve</a></li>
                        <li><a href="shop.html?cat=half%20sleeve">half sleeve</a></li>
                    </ul>
                </div>
                <div class="menu-cat">
                    <p>discover</p>
                    <ul>
                        <li><a href="lookbook.html">lookbook</a></li>
                        <li><a href="#">studio</a></li>
                        <li><a href="#">sustainability</a></li>
                    </ul>
                </div>
            </div>
            <div class="menu-account">
                <div class="account-row">
                    <a href="profile.html"><i class="far fa-user"></i> profile</a>
                    <a href="wishlist.html"><i class="far fa-heart"></i> wishlist</a>
                    <a href="orders.html"><i class="fas fa-box"></i> orders</a>
                </div>
            </div>
        </div>

        <!-- CART HEADER -->
        <div class="cart-header">
            <h1 class="page-title">your cart</h1>
            <span class="cart-count-badge" id="cartCountHeader">0 items</span>
        </div>

        <!-- CART ITEMS CONTAINER -->
        <div class="cart-items" id="cartItems">
            <!-- Loaded dynamically -->
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <!-- CART SUMMARY SECTION (will be shown/hidden by JavaScript) -->
        <div id="cartSummaryContainer" style="display: none;">
            <!-- COUPON SECTION -->
            <div class="coupon-section">
                <input type="text" class="coupon-input" id="couponCode" placeholder="enter coupon code">
                <button class="apply-coupon" onclick="applyCoupon()">apply</button>
            </div>

            <!-- PRICE SUMMARY -->
            <div class="cart-summary" id="cartSummary">
                <!-- Will be filled by JavaScript -->
            </div>

            <!-- CHECKOUT BUTTON -->
            <button class="checkout-btn" onclick="proceedToCheckout()">proceed to checkout →</button>
        </div>

        <!-- CONTINUE SHOPPING -->
        <a href="shop.html" class="continue-shopping">← continue shopping</a>
    </div>

    <!-- BOTTOM POPUP -->
    <div class="bottom-popup">
        <div class="bottom-icon" onclick="window.location='index.html'">
            <i class="fas fa-home"></i>
            <span>home</span>
        </div>
        <div class="bottom-icon" onclick="window.location='wishlist.html'">
            <i class="far fa-heart"></i>
            <span>favourite</span>
        </div>
        <div class="bottom-icon" onclick="window.location='orders.html'">
            <i class="fas fa-box"></i>
            <span>orders</span>
        </div>
        <div class="bottom-icon active" onclick="window.location='profile.html'">
            <i class="far fa-user"></i>
            <span>profile</span>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Cart page specific JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            loadCartItems();
        });

        function loadCartItems() {
            const cart = db.getCart();
            const cartItemsDiv = document.getElementById('cartItems');
            const cartSummaryContainer = document.getElementById('cartSummaryContainer');
            const cartCountHeader = document.getElementById('cartCountHeader');
            
            if (cart.length === 0) {
                // Show empty cart message
                cartItemsDiv.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <h3>your cart is empty</h3>
                        <p>Looks like you haven't added anything yet</p>
                        <button class="btn" onclick="window.location='shop.html'">start shopping</button>
                    </div>
                `;
                cartSummaryContainer.style.display = 'none';
                cartCountHeader.textContent = '0 items';
                return;
            }

            // Build cart items HTML
            let itemsHtml = '';
            let subtotal = 0;
            let totalSavings = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                
                if (item.originalPrice && item.originalPrice > item.price) {
                    totalSavings += (item.originalPrice - item.price) * item.quantity;
                }

                itemsHtml += `
                    <div class="cart-item" data-item-id="${item.id}">
                        <div class="cart-item-image" onclick="viewProduct(${item.productId})">
                            <img src="assets/images/${item.image || 'product.jpg'}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/100x100?text=${item.name}'">
                        </div>
                        <div class="cart-item-details">
                            <div class="cart-item-title" onclick="viewProduct(${item.productId})">${item.name}</div>
                            <div class="cart-item-variants">
                                ${item.size ? `Size: ${item.size}` : ''} 
                                ${item.color ? `${item.size ? ' | ' : ''}Color: ${item.color}` : ''}
                            </div>
                            <div class="cart-item-price">₹${item.price} <span class="price-details">each</span></div>
                            <div class="cart-item-actions">
                                <div class="cart-quantity">
                                    <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                </div>
                                <button class="remove-btn" onclick="removeItem(${item.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                            <div class="cart-item-price">Subtotal: ₹${itemTotal}</div>
                        </div>
                    </div>
                `;
            });

            cartItemsDiv.innerHTML = itemsHtml;
            cartCountHeader.textContent = `${cart.reduce((sum, item) => sum + item.quantity, 0)} items`;

            // Calculate totals
            const shipping = subtotal > 999 ? 0 : 99;
            const tax = Math.round(subtotal * 0.05); // 5% tax
            const total = subtotal + shipping + tax;

            // Update summary
            document.getElementById('cartSummary').innerHTML = `
                <h3 style="margin-bottom: 1rem;">price details</h3>
                <div class="summary-row">
                    <span>subtotal (${cart.length} items)</span>
                    <span>₹${subtotal}</span>
                </div>
                <div class="summary-row">
                    <span>shipping</span>
                    <span>${shipping === 0 ? 'FREE' : '₹' + shipping}</span>
                </div>
                <div class="summary-row">
                    <span>tax (5%)</span>
                    <span>₹${tax}</span>
                </div>
                ${totalSavings > 0 ? `
                <div class="summary-row" style="color: #28a745;">
                    <span>you save</span>
                    <span>-₹${totalSavings}</span>
                </div>
                ` : ''}
                <div class="summary-total">
                    <span>total amount</span>
                    <span>₹${total}</span>
                </div>
                ${subtotal < 999 ? `
                <div class="free-shipping-note">
                    🚚 Add ₹${999 - subtotal} more for FREE shipping
                </div>
                ` : ''}
            `;

            cartSummaryContainer.style.display = 'block';
        }

        function updateQuantity(itemId, newQuantity) {
            const cart = db.getCart();
            const item = cart.find(i => i.id === itemId);
            
            if (!item) return;
            
            if (newQuantity <= 0) {
                removeItem(itemId);
            } else if (newQuantity <= 10) {
                db.updateCartItem(itemId, newQuantity);
                loadCartItems();
                updateCartCount();
                showNotification('Cart updated');
            } else {
                showNotification('Maximum quantity is 10', 'error');
            }
        }

        function removeItem(itemId) {
            if (confirm('Remove this item from cart?')) {
                db.removeFromCart(itemId);
                loadCartItems();
                updateCartCount();
                showNotification('Item removed');
            }
        }

        function applyCoupon() {
            const code = document.getElementById('couponCode').value.toUpperCase();
            const cart = db.getCart();
            
            if (!code) {
                showNotification('Please enter a coupon code', 'error');
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const result = db.validateOfferCode(code, subtotal);

            if (result.valid) {
                let discount = 0;
                if (result.offer.type === 'percentage') {
                    discount = (subtotal * result.offer.discount) / 100;
                } else if (result.offer.type === 'fixed') {
                    discount = result.offer.discount;
                }
                
                showNotification(`✓ Coupon applied! You saved ₹${discount}`);
                document.getElementById('couponCode').value = '';
            } else {
                showNotification(result.message, 'error');
            }
        }

        function proceedToCheckout() {
            const cart = db.getCart();
            if (cart.length === 0) {
                showNotification('Your cart is empty', 'error');
                return;
            }
            window.location.href = 'checkout.html';
        }

        function viewProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#b65f3a' : '#dc3545'};
                color: white;
                padding: 1rem 2rem;
                border-radius: 50px;
                z-index: 9999;
                animation: slideIn 0.3s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 2000);
        }
    </script>
</body>
</html>
