<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SNOOQ · my orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .orders-header {
            margin: 1rem 0 2rem;
        }

        .order-tabs {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            border-bottom: 1px solid #e2d6ca;
            padding-bottom: 0.5rem;
        }

        .order-tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #7d5f4b;
            position: relative;
        }

        .order-tab.active {
            color: #b65f3a;
            font-weight: 600;
        }

        .order-tab.active::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 0;
            right: 0;
            height: 2px;
            background: #b65f3a;
        }

        .order-card {
            background: white;
            border: 1px solid #e2d6ca;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f0e8de;
        }

        .order-number {
            font-weight: 600;
            color: #b65f3a;
        }

        .order-date {
            color: #7d5f4b;
            font-size: 0.9rem;
        }

        .order-status {
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #cce5ff; color: #004085; }
        .status-shipped { background: #d1ecf1; color: #0c5460; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .order-items {
            margin: 1rem 0;
        }

        .order-item {
            display: grid;
            grid-template-columns: 60px 1fr auto;
            gap: 1rem;
            padding: 0.8rem 0;
            border-bottom: 1px solid #f0e8de;
        }

        .order-item-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            background: #f0e8de;
        }

        .order-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-item-details h4 {
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .order-item-details p {
            font-size: 0.8rem;
            color: #7d5f4b;
        }

        .order-item-price {
            font-weight: 600;
            color: #b65f3a;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f0e8de;
        }

        .order-total {
            font-weight: 600;
        }

        .order-total span {
            color: #b65f3a;
            font-size: 1.2rem;
        }

        .order-actions {
            display: flex;
            gap: 1rem;
        }

        .order-btn {
            padding: 0.5rem 1.5rem;
            border: 1px solid #4a3f38;
            border-radius: 30px;
            background: transparent;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .order-btn:hover {
            background: #b65f3a;
            color: white;
            border-color: #b65f3a;
        }

        .empty-orders {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2d6ca;
        }

        .empty-orders i {
            font-size: 4rem;
            color: #b65f3a;
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        @media screen and (max-width: 600px) {
            .order-footer {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MOBILE HEADER -->
        <div class="mobile-header">
            <div class="logo" onclick="window.location='index.html'">SNOOQ<span>india</span></div>
            <div class="right-actions">
                <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i><span class="cart-count" style="display:none;">0</span></button>
                <button class="icon-btn" id="bagToggle"><i class="fas fa-shopping-bag"></i></button>
                <button class="icon-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>

        <!-- MOBILE MENU -->
        <div class="menu-overlay" id="mobileMenu">
            <div class="menu-grid">
                <div class="menu-cat">
                    <p>shop</p>
                    <ul>
                        <li><a href="shop.html?filter=new">new arrivals</a></li>
                        <li><a href="shop.html?filter=bestseller">bestsellers</a></li>
                        <li><a href="shop.html?filter=offer">offers</a></li>
                    </ul>
                </div>
                <div class="menu-cat">
                    <p>discover</p>
                    <ul>
                        <li><a href="lookbook.html">lookbook</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- ORDERS HEADER -->
        <div class="orders-header">
            <h1 class="page-title">my orders</h1>
        </div>

        <!-- ORDER TABS -->
        <div class="order-tabs">
            <div class="order-tab active" onclick="filterOrders('all')">all orders</div>
            <div class="order-tab" onclick="filterOrders('pending')">pending</div>
            <div class="order-tab" onclick="filterOrders('processing')">processing</div>
            <div class="order-tab" onclick="filterOrders('shipped')">shipped</div>
            <div class="order-tab" onclick="filterOrders('completed')">completed</div>
        </div>

        <!-- ORDERS LIST -->
        <div class="orders-list" id="ordersList">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- BOTTOM POPUP -->
    <div class="bottom-popup">
        <div class="bottom-icon" onclick="window.location='index.html'">
            <i class="fas fa-home"></i>
            <span>home</span>
        </div>
        <div class="bottom-icon" onclick="window.location='wishlist.html'">
            <i class="far fa-heart"></i>
            <span>favourite</span>
        </div>
        <div class="bottom-icon active" onclick="window.location='orders.html'">
            <i class="fas fa-box"></i>
            <span>orders</span>
        </div>
        <div class="bottom-icon" onclick="window.location='profile.html'">
            <i class="far fa-user"></i>
            <span>profile</span>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });

        function loadOrders() {
            const orders = db.getOrders();
            const list = document.getElementById('ordersList');

            // Filter orders
            let filteredOrders = orders;
            if (currentFilter !== 'all') {
                filteredOrders = orders.filter(o => o.status === currentFilter);
            }

            if (filteredOrders.length === 0) {
                list.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-box-open"></i>
                        <h3>no orders found</h3>
                        <p>${currentFilter === 'all' ? 'You haven\'t placed any orders yet' : `No ${currentFilter} orders`}</p>
                        <button class="btn" onclick="window.location='shop.html'">start shopping</button>
                    </div>
                `;
                return;
            }

            // Sort by date (newest first)
            filteredOrders.sort((a, b) => new Date(b.date) - new Date(a.date));

            let html = '';
            filteredOrders.forEach(order => {
                const date = new Date(order.date).toLocaleDateString('en-IN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                const statusClass = `status-${order.status}`;

                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `
                        <div class="order-item">
                            <div class="order-item-image">
                                <img src="assets/images/${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/60x60?text=${item.name}'">
                            </div>
                            <div class="order-item-details">
                                <h4>${item.name}</h4>
                                <p>Qty: ${item.quantity} ${item.size ? '| Size: ' + item.size : ''} ${item.color ? '| Color: ' + item.color : ''}</p>
                            </div>
                            <div class="order-item-price">₹${item.price * item.quantity}</div>
                        </div>
                    `;
                });

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-number">${order.orderNumber}</span>
                                <span class="order-date">${date}</span>
                            </div>
                            <span class="order-status ${statusClass}">${order.status}</span>
                        </div>
                        
                        <div class="order-items">
                            ${itemsHtml}
                        </div>

                        <div class="order-footer">
                            <div class="order-total">
                                total: <span>₹${order.total}</span>
                            </div>
                            <div class="order-actions">
                                <button class="order-btn" onclick="trackOrder('${order.orderNumber}')">track order</button>
                                <button class="order-btn" onclick="viewOrderDetails('${order.orderNumber}')">view details</button>
                                ${order.status === 'completed' ? '<button class="order-btn" onclick="reorder(' + order.id + ')">reorder</button>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        function filterOrders(filter) {
            currentFilter = filter;
            
            // Update active tab
            document.querySelectorAll('.order-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadOrders();
        }

        function trackOrder(orderNumber) {
            alert(`🔍 Tracking order: ${orderNumber}\nYour order is on the way!`);
        }

        function viewOrderDetails(orderNumber) {
            alert(`📋 Order details for: ${orderNumber}\nView full details in your email`);
        }

        function reorder(orderId) {
            const orders = db.getOrders();
            const order = orders.find(o => o.id === orderId);
            
            if (order) {
                order.items.forEach(item => {
                    db.addToCart(item.productId, item.quantity, item.size, item.color);
                });
                updateCartCount();
                alert('✓ Items added to your cart');
                window.location.href = 'cart.html';
            }
        }
    </script>
</body>
</html>
