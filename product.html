<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SNOOQ · Product Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        .product-gallery {
            position: relative;
        }

        .main-image {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f0e8de;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 1rem;
            border: 1px solid #e2d6ca;
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
        }

        .thumbnail {
            aspect-ratio: 1/1;
            background: #f0e8de;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .thumbnail.active {
            border-color: #b65f3a;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info-section {
            padding: 1rem 0;
        }

        .product-category {
            color: #b65f3a;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin: 0.5rem 0;
        }

        .product-price {
            font-size: 2rem;
            color: #b65f3a;
            margin: 1rem 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #b19782;
            font-size: 1.2rem;
            margin-right: 1rem;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .stars {
            color: #ffb800;
        }

        .reviews {
            color: #7d5f4b;
            text-decoration: underline;
            cursor: pointer;
        }

        .product-description {
            line-height: 1.6;
            color: #5f4c3d;
            margin: 1.5rem 0;
        }

        .color-section, .size-section, .quantity-section {
            margin: 1.5rem 0;
        }

        .color-label, .size-label, .quantity-label {
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .color-options {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .color-dot.active {
            border-color: #b65f3a;
            transform: scale(1.1);
        }

        .color-dot.terracotta { background: #b65f3a; }
        .color-dot.sand { background: #d9c5b3; }
        .color-dot.charcoal { background: #4a3f38; }
        .color-dot.indigo { background: #2b6c5e; }
        .color-dot.black { background: #000000; }
        .color-dot.white { background: #ffffff; border: 1px solid #ddd; }
        .color-dot.natural { background: #f5e6d3; }
        .color-dot.pink { background: #ff69b4; }
        .color-dot.mint { background: #98ff98; }
        .color-dot.lavender { background: #e6e6fa; }
        .color-dot.blue { background: #0000ff; }
        .color-dot.gray { background: #808080; }

        .size-options {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .size-btn {
            width: 50px;
            height: 50px;
            border: 1px solid #4a3f38;
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .size-btn.active {
            background: #b65f3a;
            color: white;
            border-color: #b65f3a;
        }

        .size-btn:hover {
            background: #b65f3a;
            color: white;
        }

        .size-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #4a3f38;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .qty-btn:hover {
            background: #b65f3a;
            color: white;
        }

        .qty-input {
            width: 60px;
            height: 40px;
            text-align: center;
            border: 1px solid #4a3f38;
            border-radius: 10px;
            font-size: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
        }

        .add-to-cart {
            flex: 2;
            background: #b65f3a;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 3px 3px 0 #7d5f4b;
            transition: 0.2s;
        }

        .add-to-cart:hover {
            background: #2c241e;
            box-shadow: 3px 3px 0 #b65f3a;
            transform: translate(-2px, -2px);
        }

        .wishlist-btn {
            flex: 1;
            background: transparent;
            border: 1px solid #4a3f38;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .wishlist-btn:hover {
            background: #b65f3a;
            color: white;
        }

        .wishlist-btn.active {
            background: #b65f3a;
            color: white;
        }

        .delivery-info {
            margin: 2rem 0;
            padding: 1.5rem;
            background: #f0e8de;
            border-radius: 20px;
        }

        .delivery-info p {
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .delivery-info i {
            color: #b65f3a;
            width: 20px;
        }

        .product-tabs {
            margin: 3rem 0;
        }

        .tab-headers {
            display: flex;
            border-bottom: 1px solid #e2d6ca;
            gap: 2rem;
        }

        .tab-header {
            padding: 1rem 0;
            cursor: pointer;
            color: #7d5f4b;
            position: relative;
        }

        .tab-header.active {
            color: #b65f3a;
            font-weight: 600;
        }

        .tab-header.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: #b65f3a;
        }

        .tab-content {
            padding: 2rem 0;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .specs-list {
            list-style: none;
        }

        .specs-list li {
            padding: 0.8rem 0;
            border-bottom: 1px solid #f0e8de;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .related-products {
            margin: 3rem 0;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }

        @media screen and (min-width: 600px) {
            .product-detail {
                grid-template-columns: 1fr 1fr;
            }
            .related-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stock-status {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 1rem 0;
        }

        .in-stock {
            background: #d4edda;
            color: #155724;
        }

        .low-stock {
            background: #fff3cd;
            color: #856404;
        }

        .out-of-stock {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MOBILE HEADER -->
        <div class="mobile-header">
            <div class="logo" onclick="window.location='index.html'">SNOOQ<span>india</span></div>
            <div class="right-actions">
                <button class="icon-btn" id="searchToggle"><i class="fas fa-search"></i><span class="cart-count" style="display:none;">0</span></button>
                <button class="icon-btn" id="bagToggle"><i class="fas fa-shopping-bag"></i></button>
                <button class="icon-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>

        <!-- MOBILE MENU -->
        <div class="menu-overlay" id="mobileMenu">
            <div class="menu-grid">
                <div class="menu-cat">
                    <p>shop</p>
                    <ul>
                        <li><a href="shop.html?filter=new">new arrivals</a></li>
                        <li><a href="shop.html?filter=bestseller">bestsellers</a></li>
                        <li><a href="shop.html?filter=offer">offers</a></li>
                        <li><a href="shop.html?cat=hoodies">hoodies</a></li>
                        <li><a href="shop.html?cat=full sleeve">full sleeve</a></li>
                        <li><a href="shop.html?cat=half sleeve">half sleeve</a></li>
                    </ul>
                </div>
                <div class="menu-cat">
                    <p>discover</p>
                    <ul>
                        <li><a href="lookbook.html">lookbook</a></li>
                        <li><a href="#">studio</a></li>
                        <li><a href="#">sustainability</a></li>
                    </ul>
                </div>
            </div>
            <div class="menu-account">
                <div class="account-row">
                    <a href="profile.html"><i class="far fa-user"></i> profile</a>
                    <a href="wishlist.html"><i class="far fa-heart"></i> wishlist</a>
                    <a href="orders.html"><i class="fas fa-box"></i> orders</a>
                </div>
            </div>
        </div>

        <!-- BREADCRUMB -->
        <div class="breadcrumb" id="breadcrumb">
            <a href="index.html">home</a> > <a href="shop.html">shop</a> > <span id="productCategory"></span>
        </div>

        <!-- PRODUCT DETAIL (LOADED DYNAMICALLY) -->
        <div id="productDetailContainer">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <!-- YOU MAY ALSO LIKE -->
        <div class="related-products">
            <div class="section-title">you may also like <span>mix</span></div>
            <div class="related-grid" id="relatedProductsGrid">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- BOTTOM POPUP -->
    <div class="bottom-popup">
        <div class="bottom-icon" onclick="window.location='index.html'">
            <i class="fas fa-home"></i>
            <span>home</span>
        </div>
        <div class="bottom-icon" onclick="window.location='wishlist.html'">
            <i class="far fa-heart"></i>
            <span>favourite</span>
        </div>
        <div class="bottom-icon" onclick="window.location='orders.html'">
            <i class="fas fa-box"></i>
            <span>orders</span>
        </div>
        <div class="bottom-icon active" onclick="window.location='profile.html'">
            <i class="far fa-user"></i>
            <span>profile</span>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentProduct = null;
        let selectedColor = null;
        let selectedSize = null;
        let quantity = 1;

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (productId) {
                loadProductDetails(productId);
            } else {
                window.location.href = 'shop.html';
            }
        });

        function loadProductDetails(productId) {
            const product = db.getProductById(productId);
            
            if (!product) {
                window.location.href = 'shop.html';
                return;
            }

            currentProduct = product;
            
            // Update breadcrumb
            document.getElementById('productCategory').textContent = product.subcategory;

            // Build product HTML
            const container = document.getElementById('productDetailContainer');
            
            // Stock status
            let stockStatus = '';
            let stockClass = '';
            if (product.stock === 0) {
                stockStatus = 'Out of Stock';
                stockClass = 'out-of-stock';
            } else if (product.stock < 10) {
                stockStatus = 'Low Stock - Only ' + product.stock + ' left';
                stockClass = 'low-stock';
            } else {
                stockStatus = 'In Stock';
                stockClass = 'in-stock';
            }

            // Price HTML
            const priceHtml = product.originalPrice > product.price ? 
                `<span class="old-price">₹${product.originalPrice}</span> ₹${product.price}` : 
                `₹${product.price}`;

            // Color options
            let colorOptions = '';
            if (product.colors && product.colors.length > 0) {
                colorOptions = `
                    <div class="color-section">
                        <div class="color-label">color: <span id="selectedColor">${product.colors[0]}</span></div>
                        <div class="color-options">
                            ${product.colors.map(color => 
                                `<div class="color-dot ${color.replace(' ', '-')}" onclick="selectColor('${color}', this)"></div>`
                            ).join('')}
                        </div>
                    </div>
                `;
                selectedColor = product.colors[0];
            }

            // Size options
            let sizeOptions = '';
            if (product.sizes && product.sizes.length > 0) {
                sizeOptions = `
                    <div class="size-section">
                        <div class="size-label">size</div>
                        <div class="size-options">
                            ${product.sizes.map(size => 
                                `<button class="size-btn" onclick="selectSize(this, '${size}')">${size}</button>`
                            ).join('')}
                        </div>
                    </div>
                `;
                selectedSize = product.sizes[0];
            }

            // Rating stars
            const fullStars = Math.floor(product.rating);
            const halfStar = product.rating % 1 >= 0.5;
            let stars = '';
            for (let i = 0; i < fullStars; i++) stars += '★';
            if (halfStar) stars += '½';
            for (let i = 0; i < 5 - fullStars - (halfStar ? 1 : 0); i++) stars += '☆';

            // Images
            const mainImage = product.images && product.images.length > 0 ? product.images[0] : 'placeholder.jpg';
            const thumbnails = product.images && product.images.length > 0 ? product.images : ['placeholder.jpg'];

            container.innerHTML = `
                <div class="product-detail">
                    <!-- Gallery -->
                    <div class="product-gallery">
                        <div class="main-image">
                            <img src="assets/images/${mainImage}" alt="${product.name}" id="mainProductImage" onerror="this.src='https://via.placeholder.com/500x500?text=${product.name}'">
                        </div>
                        <div class="thumbnail-grid">
                            ${thumbnails.map((img, index) => `
                                <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeImage(this, '${img}')">
                                    <img src="assets/images/${img}" alt="view ${index + 1}" onerror="this.src='https://via.placeholder.com/100x100?text=${product.name}'">
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Product Info -->
                    <div class="product-info-section">
                        <span class="product-category">${product.subcategory} · ${product.material || 'cotton'}</span>
                        <h1 class="product-title">${product.name}</h1>
                        
                        <div class="rating">
                            <div class="stars">${stars}</div>
                            <span class="reviews" onclick="showReviews(${product.id})">(${product.reviews} reviews)</span>
                        </div>

                        <div class="product-price">
                            ${priceHtml}
                        </div>

                        <span class="stock-status ${stockClass}">${stockStatus}</span>

                        <p class="product-description">${product.description}</p>

                        ${colorOptions}
                        ${sizeOptions}

                        <div class="quantity-section">
                            <div class="quantity-label">quantity</div>
                            <div class="quantity-selector">
                                <button class="qty-btn" onclick="updateQuantity(-1)" ${product.stock === 0 ? 'disabled' : ''}>−</button>
                                <input type="text" class="qty-input" id="quantity" value="1" readonly>
                                <button class="qty-btn" onclick="updateQuantity(1)" ${product.stock === 0 ? 'disabled' : ''}>+</button>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button class="add-to-cart" onclick="addToCart()" ${product.stock === 0 ? 'disabled' : ''}>add to cart</button>
                            <button class="wishlist-btn" onclick="toggleWishlist(${product.id}, this)">
                                <i class="${db.isInWishlist(product.id) ? 'fas' : 'far'} fa-heart"></i>
                            </button>
                        </div>

                        <div class="delivery-info">
                            <p><i class="fas fa-truck"></i> free shipping on orders above ₹999</p>
                            <p><i class="fas fa-rotate-left"></i> 7 days easy return</p>
                            <p><i class="fas fa-shield"></i> secure payment</p>
                        </div>
                    </div>
                </div>

                <!-- Product Tabs -->
                <div class="product-tabs">
                    <div class="tab-headers">
                        <div class="tab-header active" onclick="showTab('details')">details</div>
                        <div class="tab-header" onclick="showTab('care')">care</div>
                        <div class="tab-header" onclick="showTab('shipping')">shipping</div>
                        <div class="tab-header" onclick="showTab('reviews')">reviews (${product.reviews})</div>
                    </div>
                    
                    <div class="tab-content">
                        <div class="tab-pane active" id="details">
                            <ul class="specs-list">
                                <li><i class="fas fa-leaf"></i> Material: ${product.material || '100% organic cotton'}</li>
                                <li><i class="fas fa-palette"></i> Technique: Hand block print</li>
                                <li><i class="fas fa-tag"></i> Fit: Oversized</li>
                                <li><i class="fas fa-tshirt"></i> Model: Wears size M</li>
                                <li><i class="fas fa-india"></i> Made in: India</li>
                            </ul>
                        </div>
                        <div class="tab-pane" id="care">
                            <p>${product.care || '♻️ Machine wash cold · Dry in shade · Iron medium · Do not bleach · Use mild detergent'}</p>
                        </div>
                        <div class="tab-pane" id="shipping">
                            <p>🚚 Free shipping in India on orders above ₹999<br>
                            📦 Standard delivery: 3-5 business days<br>
                            ⚡ Express delivery: 1-2 business days (additional charges apply)<br>
                            🌏 International shipping available (7-14 days)</p>
                        </div>
                        <div class="tab-pane" id="reviews">
                            <p>⭐ ${product.rating} out of 5 stars (${product.reviews} reviews)</p>
                            <p>Customer reviews will appear here...</p>
                        </div>
                    </div>
                </div>
            `;

            // Set first color as active
            if (product.colors && product.colors.length > 0) {
                document.querySelectorAll('.color-dot')[0]?.classList.add('active');
            }

            // Set first size as active
            if (product.sizes && product.sizes.length > 0) {
                document.querySelectorAll('.size-btn')[0]?.classList.add('active');
            }

            // Load related products
            loadRelatedProducts(product.category, product.id);
        }

        function changeImage(thumbnail, imageName) {
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            thumbnail.classList.add('active');
            document.getElementById('mainProductImage').src = `assets/images/${imageName}`;
        }

        function selectColor(color, element) {
            document.querySelectorAll('.color-dot').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('selectedColor').innerText = color;
            selectedColor = color;
        }

        function selectSize(element, size) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            selectedSize = size;
        }

        function updateQuantity(change) {
            const qty = document.getElementById('quantity');
            let val = parseInt(qty.value) + change;
            if (val < 1) val = 1;
            if (val > currentProduct.stock) val = currentProduct.stock;
            qty.value = val;
            quantity = val;
        }

        function addToCart() {
            if (!currentProduct) return;
            
            const result = db.addToCart(currentProduct.id, quantity, selectedSize, selectedColor);
            if (result.success) {
                updateCartCount();
                alert('✓ Product added to cart!');
            }
        }

        function toggleWishlist(productId, btn) {
            const icon = btn.querySelector('i');
            
            if (db.isInWishlist(productId)) {
                db.removeFromWishlist(productId);
                icon.classList.remove('fas');
                icon.classList.add('far');
                btn.classList.remove('active');
                alert('❤️ Removed from wishlist');
            } else {
                db.addToWishlist(productId);
                icon.classList.remove('far');
                icon.classList.add('fas');
                btn.classList.add('active');
                alert('❤️ Added to wishlist');
            }
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-header').forEach(h => h.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function showReviews(productId) {
            showTab('reviews');
        }

        function loadRelatedProducts(category, currentId) {
            const products = db.getAllProducts();
            const related = products
                .filter(p => p.category === category && p.id !== currentId)
                .slice(0, 4);

            const grid = document.getElementById('relatedProductsGrid');
            
            if (related.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No related products found</p>';
                return;
            }

            let html = '';
            related.forEach(product => {
                html += `
                    <div class="product-item" onclick="window.location='product.html?id=${product.id}'">
                        <div class="product-image">
                            <img src="assets/images/${product.images[0]}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x300?text=${product.name}'">
                        </div>
                        <div class="product-info">
                            <h3>${product.name}</h3>
                            <div class="price">₹${product.price}</div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }
    </script>
</body>
</html>
